<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{ title }}</title>
<style>
{{ css_tokens }}
{{ css_base }}
{% block extra_style %}{% endblock %}
</style>
</head>
<body>
<button class="print-btn no-print" onclick="window.print()">PDF / 인쇄</button>
{% block content %}
<div class="page page--cover">
  {% block cover %}
  <div class="cover">
    <h1>{{ title }}</h1>
    <div class="meta">{{ authors }} &nbsp;|&nbsp; {{ date }}</div>
  </div>
  {% endblock cover %}
</div>
<div class="page page--body">
  <div class="doc-header">
    <span>{{ classification }}</span><span>{{ classification }}</span>
  </div>
  {% for section in sections %}
  <section class="doc-section">
    {% if section.heading %}<h2>{{ section.heading }}</h2>{% endif %}
    {{ section.html_content }}
  </section>
  {% endfor %}
</div>
{% endblock content %}
</body>
</html>
