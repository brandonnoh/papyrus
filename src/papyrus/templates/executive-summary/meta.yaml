id: executive-summary
name: 대표보고 요약
description: 경영진/대표 대상 핵심 사안 요약 보고서. A4 2~4페이지.
author: 식스티헤르츠
version: "1.0"
keywords:
  - 대표보고
  - 경영진
  - 요약
  - 전략
  - 의사결정
  - 컨소시엄
  - 검토
  - 제안
sections:
  - id: cover
    name: 표지
    required: true
  - id: body
    name: 본문
    required: true
variables:
  - name: title
    type: string
    required: true
  - name: authors
    type: string
    required: true
  - name: date
    type: string
    required: true
  - name: classification
    type: string
    default: 대외비
guide_notes: |
  ## 대표보고 마크다운 작성 가이드

  ### frontmatter
  title, authors, date, classification, template_id 를 기입합니다.
  classification 기본값은 대외비입니다.

  ### 섹션 구조
  `##` 헤딩 = 섹션(한 페이지 단위), `###` = 서브섹션.
  #### 이상은 렌더링되지 않습니다.

  ### 리스트 항목
  구분자는 반드시 `: ` 를 사용합니다. ` — ` 는 금지입니다.
  (CSS가 자동으로 앞에 '—' 마커를 추가합니다.)

  ### 인용 블록 (작성자 인사이트 전용)
  `>` 인용 블록은 작성자의 판단·해석·결론만 기술합니다.
  수치나 사실 나열에는 사용하지 않습니다.

  > 이렇게 중요한 인사이트를 강조 박스로 표시합니다.

  ### 칼아웃 블록 (경고/위험 강조)
  색상이 다른 강조 박스가 필요할 때 사용합니다.

  경고 (주황):
  > [!warning] 주의가 필요한 사항을 기술합니다.

  위험 (빨강):
  > [!danger] 즉각 조치가 필요한 심각한 사항을 기술합니다.

  칼아웃은 한 줄만 지원합니다. 여러 줄이 필요하면 별도 칼아웃을 사용하세요.

  ### 표
  마크다운 파이프 테이블을 사용합니다. 첫 번째 열은 자동으로 라벨 스타일(볼드, 중앙정렬)이 적용됩니다.
