guide_notes: |
  ## 요약보고서 마크다운 작성 가이드

  ### frontmatter
  title, authors, date, classification, template_id 를 기입합니다.
  classification 기본값은 대외비입니다.

  ### 섹션 구조
  `##` 헤딩 = 섹션(한 페이지 단위), `###` = 서브섹션.
  #### 이상은 렌더링되지 않습니다.

  필수 섹션 순서:
  1. 표지 (cover)
  2. 배경 및 개요 — 왜 이 보고를 하는지, 상황과 맥락
  3. 현황 분석 — 데이터, 현황, 문제점
  4. 핵심 시사점 — 분석에서 도출한 판단과 의미
  5. 결론 및 제언 — 의사결정 요청, 권고안
  6. 첨부 (선택) — 참고자료, 상세 데이터

  ### 표지 (cover)
  표지 섹션의 본문은 비워두거나 한 줄 부제목만 기술합니다.
  title, authors, date는 frontmatter에서 자동 렌더링됩니다.

  ### 현황 분석
  표로 수치/현황을 기술하고, 서브섹션(###)으로 항목을 나눕니다.

  ### 핵심 시사점
  인용 블록(>)으로 핵심 판단을 강조합니다.

  > 이렇게 중요한 시사점을 강조 박스로 표시합니다.

  ### 리스트 항목
  구분자는 반드시 `: ` 를 사용합니다. ` — ` 는 금지입니다.
  (CSS가 자동으로 앞에 '—' 마커를 추가합니다.)

  ### 칼아웃 블록 (경고/위험 강조)
  경고 (주황):
  > [!warning] 주의가 필요한 사항을 기술합니다.

  위험 (빨강):
  > [!danger] 즉각 조치가 필요한 심각한 사항을 기술합니다.

  칼아웃은 한 줄만 지원합니다. 여러 줄이 필요하면 별도 칼아웃을 사용하세요.

  ### 표
  마크다운 파이프 테이블을 사용합니다. 첫 번째 열은 자동으로 라벨 스타일(볼드, 중앙정렬)이 적용됩니다.

  ### 차트
  표 바로 아래 줄에 `<!-- chart:TYPE -->` 주석을 추가하면 차트로 렌더링됩니다.
  - chart:bar — 비교·순위 (멀티 열 자동으로 grouped bar)
  - chart:line — 추이·트렌드
  - chart:pie — 비율·구성 (열이 1개면 pie, 2개+ 면 doughnut)
  - chart:gantt — 프로젝트 일정 (열 순서: 항목 | 시작(주) | 기간(주))

  ### 다이어그램
  ```mermaid 코드블록으로 다이어그램을 삽입합니다.
  - flowchart LR — 가로 프로세스 흐름
  - flowchart TD — 세로 의사결정 흐름
  - sequenceDiagram — 시스템·참여자 간 통신
  - mindmap — 개념·구조 방사형 정리

  ### 이미지
  전체 너비: `![캡션](./파일명.png)` 또는 URL
  좌측 이미지 + 우측 텍스트:
  ```
  <!-- img:left -->
  ![캡션](./파일명.png)
  우측 설명 텍스트
  <!-- /img -->
  ```
  우측 이미지 + 좌측 텍스트:
  ```
  <!-- img:right -->
  ![캡션](./파일명.png)
  좌측 설명 텍스트
  <!-- /img -->
  ```
