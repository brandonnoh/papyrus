guide_notes: |
  ## 회고 마크다운 작성 가이드

  ### frontmatter
  title, authors, date, classification, template_id 를 기입합니다.
  template_id는 반드시 `retrospective` 으로 지정합니다.
  date는 프로젝트·분기 종료일 또는 회고 일자를 기입합니다.
  classification 기본값은 내부용입니다.

  ### 섹션 구조
  `##` 헤딩 = 섹션(한 페이지 단위), `###` = 서브섹션.
  #### 이상은 렌더링되지 않습니다.

  필수 섹션 순서:
  1. 표지 (cover) — 본문 비우거나 한 줄 부제목만
  2. 개요 — 프로젝트·분기 기간, 목표, 참여자 표로 정리
  3. 주요 성과 — 달성한 핵심 결과 (정량 수치 포함)
  4. 잘된 점 — 계속 유지할 것
  5. 개선이 필요한 점 — 다음에 바꿀 것
  6. 다음 액션 — 표(항목·담당자·기한·상태)로 정리 (필수)

  선택 섹션:
  - 지표 분석 — 목표 vs 실적 데이터와 차트
  - 타임라인 — 실제 진행 흐름 (gantt)

  ### 개요 섹션
  표로 기간·목표·참여자·범위를 정리합니다.

  | 구분 | 내용 |
  |---|---|
  | 기간 | 2026-01-01 ~ 2026-03-31 |
  | 목표 | OO 달성 |
  | 참여자 | 홍길동, 김철수 |

  ### 잘된 점 / 개선이 필요한 점
  핵심 판단은 인용 블록(>)으로 강조합니다.

  > 이렇게 잘된 점의 핵심 통찰을 강조 박스로 기술합니다.

  ### 다음 액션 섹션
  표(항목·담당자·기한·상태)가 필수입니다.

  | 항목 | 담당자 | 기한 | 상태 |
  |---|---|---|---|
  | 작업명 | 홍길동 | 2026-04-30 | 진행중 |

  상태값: 완료 / 진행중 / 대기

  ### 지표 분석 섹션 (선택)
  목표 vs 실적 표 + `<!-- chart:bar -->` 또는 `<!-- chart:line -->` 활용.

  ### 타임라인 섹션 (선택)
  gantt 차트로 실제 진행 흐름 표시.

  | 항목 | 시작(주) | 기간(주) |
  |---|---|---|
  | 기획 | 0 | 2 |
  <!-- chart:gantt -->

  (리스트·칼아웃·표·차트·다이어그램·이미지·각주 구문은
  get_template_guide_tool 응답에 자동 포함됩니다.)
