  - 액션아이템
  - 안건
  - 참석자
  - minutes
sections:
  - id: cover
    name: 표지
    required: true
  - id: 회의 개요
    name: 회의 개요
    required: true
  - id: 논의 내용
    name: 논의 내용
    required: true
  - id: 결정 사항
    name: 결정 사항
    required: false
  - id: 액션 아이템
