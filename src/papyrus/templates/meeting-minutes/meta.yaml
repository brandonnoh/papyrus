guide_notes: |
  ## 회의록 마크다운 작성 가이드

  ### frontmatter
  title, authors, date, classification, template_id 를 기입합니다.
  classification 기본값은 내부용입니다.

  ### 회의 개요 (필수)
  첫 섹션. 표로 일시, 장소, 참석자, 안건을 기술합니다.

  | 구분 | 내용 |
  |---|---|
  | 일시 | 2026-04-19 (토) 14:00 - 15:30 |
  | 장소 | 본사 3층 회의실 A |
  | 참석자 | 홍길동, 김철수, 이영희 |
  | 안건 | 1. 주제A, 2. 주제B |

  ### 논의 내용 (필수)
  안건별로 서브섹션(###)으로 나눕니다.
  핵심 판단·결론은 인용 블록(>) 으로 기술합니다.

  > 이와 같이 회의에서 도출된 핵심 판단을 강조 박스로 표시합니다.

  ### 결정 사항 (선택)
  항목명: 내용 형식의 리스트로 기술합니다.

  ### 액션 아이템 (선택)
  표로 항목, 담당자, 기한, 상태를 기술합니다.
  상태값: 완료 / 진행중 / 대기

  | 항목 | 담당자 | 기한 | 상태 |
  |---|---|---|---|
  | 작업명 | 홍길동 | 2026-04-26 | 진행중 |

  ### 다음 회의 (선택)
  리스트로 일시, 장소, 안건을 기술합니다.

  ### 리스트 항목
  구분자는 반드시 `: ` 를 사용합니다. ` — ` 는 금지입니다.
  (CSS가 자동으로 앞에 '—' 마커를 추가합니다.)

  ### 칼아웃 블록 (경고/위험 강조)
  색상이 다른 강조 박스가 필요할 때 사용합니다.

  경고 (주황):
  > [!warning] 주의가 필요한 사항을 기술합니다.

  위험 (빨강):
  > [!danger] 즉각 조치가 필요한 심각한 사항을 기술합니다.

  칼아웃은 한 줄만 지원합니다. 여러 줄이 필요하면 별도 칼아웃을 사용하세요.
